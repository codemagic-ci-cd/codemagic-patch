# Independent Yarn install root for the on-device demo app, separate from the
# repo-root monorepo. This tree syncs to the public OSS mirror, so it must not
# be a root workspace: a root workspace entry would leak into the exported
# package.json/yarn.lock and break `yarn install --immutable` in the public
# repo (same rule as infra/pulumi and client/e2e/fixture-app). Keep
# `nodeLinker` aligned with the parent.
nodeLinker: node-modules
